---
# PR gate: every pull request to main (and every push to a non-main branch) must
# pass linting, tests, the native CLI commands, and the generated-artifact
# freshness check before it can be merged. Unlike python-test.yml this runs on
# `synchronize` (PR updates) and does NOT path-ignore YAML — schema/data changes
# must be checked.
name: CI checks

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (pre-commit hooks)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run tests
        run: pytest

      - name: Native CLI commands
        run: |
          python -m sentier_vocab generate
          python -m sentier_vocab coverage

      - name: Generated artifacts are up to date
        run: |
          git diff --exit-code -- output/flows.ttl docs/COVERAGE.md \
            || { echo "::error::output/flows.ttl or docs/COVERAGE.md is stale — run 'python -m sentier_vocab generate' and 'python -m sentier_vocab coverage' and commit the result."; exit 1; }

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
