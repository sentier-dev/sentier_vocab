# Pre-commit hooks for sentier_vocab.
# Transitional importer code and generated artifacts are excluded from style
# enforcement (see the `exclude` regex).
# Generated TTL artifacts (\.ttl$) are excluded so the generator's exact output
# is preserved (whitespace/EOF hooks must not rewrite generated graphs).
exclude: '^(app/sentier_vocab/importers/|schemas/_generated/|docs/conf\.py)|\.ttl$'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "100"]
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: ["--line-length", "100"]
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]
